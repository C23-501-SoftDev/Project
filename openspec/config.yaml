schema: spec-driven

# Project context
# Это показывается ИИ при создании артефактов.
context: |
  Стек технологий:
  - Бэкенд: Java 17 или 21, Spring Boot 3.4, Spring MVC, Spring Security, Spring Data JPA, Maven
  - Аутентификация: JWT в HttpOnly Cookie, CSRF-защита через X-XSRF-TOKEN
  - Фронтенд: Thymeleaf (SSR), JavaScript, Tiptap Editor (WYSIWYG Markdown)
  - БД: PostgreSQL 18 (основная), H2 (тесты)
  - Миграции БД: Liquibase
  - Контроль версий документов: JGit
  - API документация: SpringDoc OpenAPI (Swagger UI)
  - Утилиты: Lombok (boilerplate reduction)

  Архитектура:
  - Чистая архитектура (Clean Architecture) с разделением на 4 слоя:
    - domain — сущности, интерфейсы репозиториев, use-cases (не зависит от Spring)
    - application — бизнес-логика, сервисы, DTO маппинг
    - interfaces — REST контроллеры, MVC контроллеры, DTO
    - infrastructure — реализации репозиториев (Spring Data JPA, JGit), email, конфигурации

  Структура проекта:
  Project/
  ├── backend/              # Spring Boot бэкенд (Java/Maven)
  │   ├── src/main/java/com/knowledgebase/
  │   │   ├── domain/         # Ядро: сущности, репозитории-интерфейсы
  │   │   ├── application/    # Бизнес-логика и сервисы
  │   │   ├── interfaces/     # REST/MVC контроллеры, DTO
  │   │   └── infrastructure/ # JPA репозитории, JGit, email
  │   ├── src/main/resources/ # application.yml, Liquibase changelog, шаблоны Thymeleaf
  │   └── src/test/           # Юнит и интеграционные тесты
  ├── frontend/             # Фронтенд (статические ресурсы, CSS/JS)
  ├── openspec/             # OpenSpec: спецификации, feature registry, quality gates
  └── README.md             # Инструкция по настройке OpenSpec

  Бэктрекер:
  - В Project/BACKTRACKER.md описано какие страницы есть/должны быть в приложении и какие запросы они используют

  Документация (соседняя директория ../Docs/):
  - ../Docs/project_navigation.md — навигация по всей документации
  - ../Docs/base-requirements.md — требования к системе (источник истины)
  - ../Docs/logic_scheme.md — логическая схема и потоки данных
  - ../Docs/documents/backlog.json — бэклог проекта (Epics → Features → User Stories)
  - ../Docs/documents/backlog-descriptions/ — детальные описания задач
  - ../Docs/documents/design-guid.md — дизайн-система и UI стили
  - При реализации задачи используйте соответствующее описание из backlog-descriptions/

# Правила для артефактов (опционально)
# Добавьте пользовательские правила для конкретных артефактов.
# Пример:
#   rules:
#     proposal:
#       - Держать предложения в пределах 500 слов
#       - Всегда включать раздел "Вне скоупа"
#     tasks:
#       - Разбивать задачи на части не более 2 часов
rules:
  proposal:
    - Выберите featureId из openspec/feature-registry.json (или создайте новую запись) и укажите его в предложении.
    - Приложите ссылку на соответствующий файл(ы) описания бэклога из папки Docs, использованные в качестве входных данных.
  design:
    - Должен быть указан предполагаемый участок кода для изменений (controller/service/repository/db).
  tasks:
    - Включите задачу "Проверка критериев качества", которая ссылается на openspec/quality-gates.md.
    - Если changes затрагивают API (новые/изменённые эндпоинты, изменение формата ответа/запроса),
      включите задачу "Обновить BACKTRACKER.md — актуализировать затронутые эндпоинты и их статусы"