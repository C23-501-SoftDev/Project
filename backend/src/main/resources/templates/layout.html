<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} ?: 'База знаний'">База знаний</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
    <!-- Навигационная панель -->
    <nav class="navbar" th:if="${currentUser != null}">
        <div class="navbar-brand">
            <a th:href="@{/}">База знаний</a>
        </div>
        <div class="navbar-search">
            <form th:action="@{/search}" method="get">
                <input type="text" name="q" placeholder="Поиск документов..." th:value="${searchQuery}">
                <button type="submit">Найти</button>
            </form>
        </div>
        <div class="navbar-menu">
            <span class="user-info" th:text="${currentUser.name}">Пользователь</span>
            <span class="user-role" th:text="${currentUser.role.displayName}">Роль</span>
            <form th:action="@{/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="btn-logout">Выйти</button>
            </form>
        </div>
    </nav>

    <!-- Основной контент -->
    <div class="container">
        <!-- Боковая панель (только для авторизованных) -->
        <aside class="sidebar" th:if="${currentUser != null}">
            <div class="sidebar-header">
                <h3>Пространства</h3>
            </div>
            <div class="space-tree" th:if="${spaces != null}">
                <ul class="space-list">
                    <li th:each="space : ${spaces}" class="space-item">
                        <a th:href="@{/spaces/{id}(id=${space.id})}" 
                           th:text="${space.name}" 
                           th:classappend="${currentSpace != null && currentSpace.id == space.id} ? 'active'">
                            Пространство
                        </a>
                    </li>
                </ul>
            </div>
            <div class="sidebar-actions">
                <a th:href="@{/documents/new}" class="btn btn-primary">Создать документ</a>
            </div>
        </aside>

        <!-- Главная область контента -->
        <main class="main-content">
            <div th:replace="${content}">
                <!-- Контент страницы будет вставлен здесь -->
            </div>
        </main>
    </div>

    <script th:src="@{/js/main.js}"></script>
    <script th:insert="${additionalScripts}">
        <!-- Дополнительные скрипты для конкретной страницы -->
    </script>
</body>
</html>
